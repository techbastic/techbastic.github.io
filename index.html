<!DOCTYPE html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;

      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;

      margin-bottom: 0.5rem;
    }

    p {

      margin-bottom: 1rem;

<body>
